name: Publish phenix Docker & Debian Packages
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['main']
  repository_dispatch:
    types: [apps-update]
env:
  MM_REV: aecea71
jobs:
  build-and-publish:
    name: Build and Publish Docker & Debian Packages
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get short SHA
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/phenix
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            MM_MIN_REV=${{ env.MM_REV }}
            PHENIX_COMMIT=${{ env.sha }}
            PHENIX_TAG=${{ steps.meta.outputs.version }}
            APPS_REPO=github.com/${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repo || 'sandialabs/sceptre-phenix-apps' }}
            APPS_BRANCH=main
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build Debian Package
        env:
          PHENIX_BUILD_IMAGE: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: ./scripts/build-deb.sh

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: phenix-deb-package
          path: build/deb/*.deb
          retention-days: 3

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} build/deb/*.deb --generate-notes

      - name: Docker meta for JIT UI
        id: meta-jit
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/phenix-jit-ui
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
      - name: Build JIT container image
        uses: docker/build-push-action@v6
        with:
          context: docker/jit
          file: docker/jit/Dockerfile
          build-args: |
            PHENIX_REPO=${{ github.event.pull_request.head.repo.full_name || github.repository }}
            PHENIX_IMG=${{ fromJSON(steps.meta.outputs.json).tags[0] }}
            PHENIX_BRANCH=${{ github.head_ref || github.ref_name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-jit.outputs.tags }}
    outputs:
      image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}

  # Build the Podman Containerfile so it can't drift from the Docker build and
  # break unnoticed. podman is preinstalled on ubuntu-latest runners.
  build-podman:
    name: Build Podman Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get short SHA
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Build Podman image (through the Go build stage)
        # Build the jsbuilder + gobuilder stages, which cover everything that can
        # break from a code change. The final runtime stage pulls several
        # external, flaky resources (filebeat, vmdb2, the Kali keyring), so it is
        # intentionally skipped here to keep this check reliable.
        run: |
          podman build \
            -f podman/Containerfile \
            --target gobuilder \
            --build-arg PHENIX_COMMIT=${{ env.sha }} \
            --build-arg PHENIX_VERSION=ci \
            -t phenix-podman-ci \
            .
